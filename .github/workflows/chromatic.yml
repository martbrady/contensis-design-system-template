name: Chromatic

# Disabled by default in this template — no CHROMATIC_PROJECT_TOKEN is configured here.
# When creating a new project from this template:
#   1. Set up a Chromatic project at https://www.chromatic.com
#   2. Add CHROMATIC_PROJECT_TOKEN to your repository secrets
#   3. Uncomment the push trigger below to enable automatic builds on main

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
